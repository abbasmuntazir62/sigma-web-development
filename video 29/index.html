<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>

    <style>
        body{
            background-color: #e5e5e5;
        }

        .card{
            width: 350px;
            background-color: white;
            border-radius: 15px;
            margin: 30px auto;
            padding: 15px;
        }

        .card img{
            width: 100%;
            border-radius: 15px;
        }

        .tag{
            display: inline-block;
            border: 1px solid lightgray;
            border-radius: 20px;
            padding: 5px 15px;
            margin-top: 10px;
            color: gray;
        }

        h1{
            font-family: Arial, sans-serif;
        }

        p{
            color: gray;
            line-height: 1.5;
        }

        .btn{
            text-align: center;
        }

        button{
            border: none;
            background-color: #dcecff;
            color: blue;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="card">

        <img src="image.jpg" alt="Lake">

        <span class="tag">Nature</span>
        <span class="tag">Lake</span>

        <h1>Lago di Braies</h1>

        <p>
            Lorem ipsum dolor sit amet, consectetur adipisicing elit.
            Consectetur sodales morbi dignissim sed diam.
        </p>

        <div class="btn">
            <button>Read More</button>
        </div>

    </div>

</body>
</html>
