<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Design navbar of a website</title>
    <style>
        .navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
}

.nav-links {
    display: flex;
    list-style: none;
    gap: 30px;
}

.nav-links a {
    text-decoration: none;
    color: black;
}
    </style>
</head>
<body>
    <nav class="navbar">
    <div class="logo">
        UltraEdit
    </div>

    <ul class="nav-links">
        <li><a href="#">Products</a></li>
        <li><a href="#">Pricing</a></li>
        <li><a href="#">Resources</a></li>
        <li><a href="#">About Us</a></li>
    </ul>
</nav>
</body>
</html>
