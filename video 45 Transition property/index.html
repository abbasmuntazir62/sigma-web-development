<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css transition property</title>
    <style>
        .container{
            background-color: antiquewhite;
            width: 50vw;
            height: 40vh;
          
        }
        .box{
            background-color: aqua;
            width: 5vw;
            height: 4vh;
           transition-property: transform;
            transition-duration: 4s;
            transition-delay: 1s;
            transition-timing-function: cubic-bezier(0.42, 0, 0.42, 0.66);;
        }
        .transition{
            transform: translatex(10vw) translatey(10vh);
        }
    </style>
</head>
<body>
    <div class="container">
    <div class="box transition" ></div>
    </div>
    
    
</body>
</html>
