<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS BOX MODEL</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
     .box{
        background-color: aquamarine;
     }
     .box1{
      color: brown;
      padding: 5px;
      margin: 25px;
      border: 2px solid blue;
      height: 200px;
      box-sizing:border-box ;
     }
    .box2{
       color: blueviolet;
      padding: 5px;
      margin: 25px;
      border: 2px solid blue;
      height: 200px;
      box-sizing:border-box ;
    }
     
    </style>
</head>
<body>
    <div class="box box1">I am a student </div>
    <div class="box box2">I am a student </div>
   
</body>
</html>
