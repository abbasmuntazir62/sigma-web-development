<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> style Lists used in Css </title>
    <style>
        nav ul li {
        list-style: devanagari;
        list-style-type: "😎";
        background-color: yellow;
        list-style-position:inside;
        border: 2px solid black;
        }
    </style>
</head>
<body>
    <nav>
        <ul>
        <li>About</li>
        <li>Home</li>
        <li>experience</li>
        </ul>
    </nav>
    
</body>
</html>
