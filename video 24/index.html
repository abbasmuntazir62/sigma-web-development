<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow and outlines</title>
    <style>
        .box {
            border: 2px solid black;
            padding: 30px;
            margin: 23px;
            box-shadow: 5px 15px 5px #ca0505;
        }

        .text-element {
            text-Shadow: 2px 4px 6px #940a0a99;
        }
    </style>
</head>

<body>
    <div class="box">
        This is a rectangular box
    </div>
    <p class="text-element">
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Perspiciatis qui eum at dolorum nihil est nostrum, a
        ipsa voluptatem illo veniam! Omnis doloremque deleniti at expedita culpa aperiam fuga ducimus.
    </p>
</body>

</html>
