<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>

<body>
    <caption>Student details</caption>
    <table>
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>city</th>
        </tr>
        <tr>
            <td colspan="2"> Abbas</td>
            <td row="2"> 22 </td>
            <td > DElhi </td>
        </tr>
    </table>
    <ul type="square">
  <li>Pen</li>
  <li>Pencil</li>
  <li>Eraser</li>
</ul>
<ol type="A">
  <li>Mango</li>
  <li>Grapes</li>
  <li>Litchi</li>
</ol>

</body>
</html>
