<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Css Transition and Animation</title>
    <style>
        .container {
            position: relative;
            width: 80vw;
            height: 70vh;
            background-color: brown;
        }

        .box {
            width: 121px;
            height: 121px;
            background-color: blue;
            position: absolute;
            bottom: 0;
            left: 0;
            border-radius: 70px;
            animation: bounce 1s infinite;
        }


        @keyframes bounce {
            0% {
                transform: translate(0, 0);
            }

            25% {

                transform: translate(150px, -50px);
            }

            50% {
                transform: translate(300px, 0);
            }

            75% {
                transform: translate(450px, -50px);
            }

            100% {
                transform: translate(600px, 0);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box"></div>
    </div>

</body>

</html>
