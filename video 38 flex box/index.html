<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex box</title>
    <style>
        .container{
            display: flex;
            border: 2px solid black;
            justify-content: center;
            align-items: center;
/*          */
            /* justify-content: space-between; */

        }
        .box{
            height: 32px;
            width: 32px;
            border: 2px solid black;
            margin: 4px;
           background-color: blue;
        }
    </style>
</head>
<body>
    
    <div class="container">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>


    
    
</body>
</html>
