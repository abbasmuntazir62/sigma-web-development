<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> object fit and object cover</title>
    <style>
        .container {
            width: 488px;
            height: 633px;
            background-color: aqua;
            border: 2px solid black;
        }
        img{
            width: 488px;
             height: 633px;
             object-fit: cover;
             object-position: top right;
             object-fit: fill;

        }
    </style>
</head>

<body>
    <div class="container">
   <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS4Y0gi55HZHJ_9Tqz9Za1lSjwwoYuNknsLv6snN2eO7w&s=10" alt="">
   </div>

</body>

</html>
