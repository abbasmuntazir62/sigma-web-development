<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Media </title>
    <style>
        body{
            background-color:blue;
        }
        @media screen and (orientation:landscape){
            body{
                border:2px solid purple;
            }

        }
        @media only screen and (max-width:455px){
            body{
                background-color: red;
            }
        }
        .boxes{
            display:flex;
        }
        .box{
            width: 344px;
            height:344px;
            margin: 3px;
            padding: 3px;
            background-color: aqua;
        }
    </style>
</head>
<body>
    <div>Hey i am a red body guy </div>
    <div class="boxes">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    
</body>
</html>
